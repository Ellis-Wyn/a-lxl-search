[pytest]
# pytest 配置文件

# 测试路径
testpaths = tests

# Python 文件匹配模式
python_files = test_*.py

# Python 类匹配模式
python_classes = Test*

# Python 函数匹配模式
python_functions = test_*

# 命令行选项
addopts =
    # 详细输出
    -v
    # 显示本地变量（失败时）
    -l
    # 显示测试覆盖率
    --cov=.
    --cov-report=html
    --cov-report=term-missing
    # 忽略某些目录
    --ignore=tests/e2e
    # 警告设置
    -W ignore::DeprecationWarning

# 标记定义
markers =
    unit: 单元测试
    integration: 集成测试
    slow: 慢速测试
    database: 需要数据库的测试
    api: API测试

# 最小测试覆盖率目标
cov-fail-under = 80

# 覆盖率包含的路径
cov-source = .
