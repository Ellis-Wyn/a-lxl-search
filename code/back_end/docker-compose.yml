# ==============================================
# 病理AI药研情报库 - Docker Compose配置 (P8标准)
# ==============================================
# 特性：
# - 资源限制（防止OOM）
# - 多环境支持（dev/staging/prod）
# - 健康检查完善
# - 日志轮转配置
# - 监控集成（Prometheus + Grafana）
# - 备份策略
# ==============================================

services:
  # ==================== FastAPI应用 ====================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_DATE: ${BUILD_DATE:-2026-03-13}
        VERSION: ${VERSION:-2.4.0}
        VCS_REF: ${VCS_REF:-main}
    image: ${IMAGE_REGISTRY:-pathology-ai}/app:${VERSION:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-pathology-ai}-app
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
      - .env.${ENVIRONMENT:-dev}
    environment:
      # Docker内部网络配置
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Python优化
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      # 日志目录
      - ./logs:/app/logs
      # 静态文件
      - ./static:/app/static
      # 临时文件
      - tmp_data:/tmp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pathology-network
      - monitoring-network
    restart: unless-stopped
    # ========== P8: 资源限制 ==========
    deploy:
      resources:
        limits:
          cpus: '1.0'        # 最多使用1核
          memory: 1G         # 最多使用1GB内存
        reservations:
          cpus: '0.25'       # 保证0.25核
          memory: 256M       # 保证256MB内存
    # ========== 健康检查 ==========
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # ========== 日志配置 ==========
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service,environment"
        tag: "{{.Name}}/{{.ID}}"
    # ========== 安全配置 ==========
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: false  # 需要写入日志
    tmpfs:
      - /tmp:noexec,nosuid,size=100m

  # ==================== PostgreSQL数据库 ====================
  postgres:
    image: postgres:17-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-pathology-ai}-postgres
    env_file:
      - .env
    environment:
      # PostgreSQL配置
      - POSTGRES_USER=${POSTGRES_USER:-pathology_ai}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-pathology_ai}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=C
      # 性能优化（针对小规模数据）
      - shared_buffers=128MB        # 缓冲区（总内存的25%）
      - effective_cache_size=512MB   # 有效缓存
      - maintenance_work_mem=64MB    # 维护操作内存
      - work_mem=4MB                 # 每个查询操作的内存
      - max_connections=50           # 最大连接数
      - checkpoint_completion_target=0.9
      - wal_buffers=4MB
      - random_page_cost=1.1         # SSD优化
    ports:
      # 仅绑定localhost，不对外暴露（安全）
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      # 数据持久化
      - postgres_data:/var/lib/postgresql/data
      # 初始化脚本
      - ./database/init:/docker-entrypoint-initdb.d:ro
      # 备份目录
      - ./backups:/backups
    networks:
      - pathology-network
      - monitoring-network
    restart: unless-stopped
    # ========== P8: 资源限制 ==========
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    # ========== 健康检查 ==========
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pathology_ai} -d ${POSTGRES_DB:-pathology_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    # ========== 安全配置 ==========
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    shm_size: 128mb

  # ==================== Redis缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-pathology-ai}-redis
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    ports:
      # 仅绑定localhost
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - pathology-network
      - monitoring-network
    restart: unless-stopped
    # ========== P8: 资源限制 ==========
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # ==================== Prometheus监控 ====================
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: ${COMPOSE_PROJECT_NAME:-pathology-ai}-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    networks:
      - monitoring-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'

  # ==================== Grafana可视化 ====================
  grafana:
    image: grafana/grafana:10.3.0
    container_name: ${COMPOSE_PROJECT_NAME:-pathology-ai}-grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://${GRAFANA_DOMAIN:-monitoring.your-domain.com}
      - GF_INSTALL_PLUGINS=redis-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - monitoring-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M
    depends_on:
      - prometheus

  # ==================== Redis Exporter ====================
  redis-exporter:
    image: oliver006/redis_exporter:v1.57.0
    container_name: ${COMPOSE_PROJECT_NAME:-pathology-ai}-redis-exporter
    environment:
      - REDIS_ADDR=redis://redis:6379
    networks:
      - monitoring-network
      - pathology-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M

  # ==================== Postgres Exporter ====================
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.14.0
    container_name: ${COMPOSE_PROJECT_NAME:-pathology-ai}-postgres-exporter
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER:-pathology_ai}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pathology_ai}?sslmode=disable
    networks:
      - monitoring-network
      - pathology-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M

# ==================== 网络配置 ====================
networks:
  pathology-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: pathology-br
    ipam:
      config:
        - subnet: 172.20.0.0/24
  monitoring-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: monitoring-br
    ipam:
      config:
        - subnet: 172.21.0.0/24

# ==================== 数据卷 ====================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  tmp_data:
    driver: local
