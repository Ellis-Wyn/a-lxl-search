# ==============================================
# Grafana仪表板配置 (P8标准)
# ==============================================

apiVersion: 1

providers:
  - name: 'Pathology AI Dashboards'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: true
