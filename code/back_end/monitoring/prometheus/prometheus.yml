# ==============================================
# Prometheus配置 (P8标准)
# ==============================================

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    cluster: 'pathology-ai'
    environment: '${ENVIRONMENT:-production}'

# 告警规则文件
rule_files:
  - '/etc/prometheus/rules/*.yml'

# 告警管理器（可选）
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#             - alertmanager:9093

# 抓取配置
scrape_configs:
  # ==================== Prometheus自身监控 ====================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # ==================== FastAPI应用 ====================
  # 需要在应用中集成 /metrics 端点
  - job_name: 'pathology-ai-app'
    static_configs:
      - targets: ['app:8000']
        labels:
          service: 'api'
          tier: 'backend'
    metrics_path: '/metrics'
    scrape_interval: 30s

  # ==================== PostgreSQL ====================
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'database'
          tier: 'data'

  # ==================== Redis ====================
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'cache'
          tier: 'data'

  # ==================== Docker容器监控 ====================
  - job_name: 'docker'
    static_configs:
      - targets: ['host.docker.internal:9323']
        labels:
          service: 'docker'
    scrape_interval: 1m

  # ==================== 节点监控 ====================
  - job_name: 'node'
    static_configs:
      - targets: ['host.docker.internal:9100']
        labels:
          service: 'node'
    scrape_interval: 1m
